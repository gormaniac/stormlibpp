name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pipenv
        run: pip install pipenv

      - name: Set up project environment
        run: make setup

      - name: Build stormlibpp python package
        run: make build

      - name: Build all Storm packages
        run: make build-storm

      - name: Build documentation
        run: make docs

      - name: Package documentation
        run: tar -czf docs.tar.gz -C docs .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/*
            docs.tar.gz
